document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,58,.04)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap\">\n          <div><div style=\"font-size:15px;font-weight:600;letter-spacing:-.01em\">ตารางรายสถาบัน<\u002Fdiv><div style=\"font-size:11.5px;color:#93a1b8;margin-top:2px\">จำแนกเพศและระดับการศึกษา · คลิกแถวเพื่อกรอง<\u002Fdiv><\u002Fdiv>\n          <input value=\"{{ univSearch }}\" oninput=\"{{ onUnivSearch }}\" placeholder=\"ค้นหาสถาบัน…\" style=\"font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid #e3e8f0;border-radius:9px;width:220px;outline:none;color:#16233a;background:#f7f9fc\">\n        <\u002Fdiv>\n        {{ tableEl }}\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"margin-top:22px;font-size:11.5px;color:#93a1b8;line-height:1.6\">\n      แหล่งข้อมูล: ระบบรายงานข้อมูลนักศึกษาต่างชาติในสถาบันอุดมศึกษา · {{ period }} · รวม {{ baseTotal }} คน จาก {{ baseNat }} สัญชาติ ใน {{ baseUniv }} สถาบัน\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst DIM = { nat:0, type:1, master:2, univ:3, gender:4, level:5, faculty:6, degree:7, year:8 };\nconst DIM_TH = { nat:'สัญชาติ', type:'ประเภทสถาบัน', master:'กลุ่มสถาบัน', univ:'สถาบัน', gender:'เพศ', level:'ระดับ', faculty:'คณะ', degree:'หลักสูตร', year:'ชั้นปี' };\nconst C = {\n  ink:'#16233a', sub:'#5b6b84', muted:'#93a1b8',\n  card:'#ffffff', border:'#e3e8f0', track:'#eef2f8',\n  primary:'#2b5cc4', accent:'#e8804d', hover:'#f5f8fd'\n};\nconst TYPE_COLORS = { 'สถาบันอุดมศึกษาเอกชน':'#7b61d6', 'สถาบันอุดมศึกษารัฐ':'#2b5cc4', 'สถานศึกษานอกสังกัดฯ':'#8fa3bf' };\nconst GENDER_COLORS = { 'ชาย':'#2f6fb0', 'หญิง':'#d76b96' };\nconst fmt = v => Math.round(v).toLocaleString('en-US');\nfunction titleCaseNat(s){\n  if(!s) return s;\n  if(s === s.toLowerCase()) return s.charAt(0).toUpperCase()+s.slice(1);\n  return s.toLowerCase().replace(/(^|[\\s/,\\-])([a-z])/g, (m,p,c)=>p+c.toUpperCase());\n}\n\nclass Component extends DCLogic {\n  state = { data:null, err:null, filters:{}, univSearch:'', search:{} };\n\n  componentDidMount(){ this.loadData(0); }\n  loadData(tries){\n    if(window.__STUDENT_DATA){ this.setState({data:window.__STUDENT_DATA}); return; }\n    if(tries<50){ setTimeout(()=>this.loadData(tries+1), 80); return; }\n    fetch('data/records.json').then(r=>r.json()).then(data=>this.setState({data}))\n      .catch(e=>this.setState({err:String(e)}));\n  }\n\n  toggle(dim, idx){\n    this.setState(s=>{\n      const f = {...s.filters};\n      const cur = f[dim] ? [...f[dim]] : [];\n      const at = cur.indexOf(idx);\n      if(at>=0) cur.splice(at,1); else cur.push(idx);\n      if(cur.length) f[dim] = cur; else delete f[dim];\n      return { filters:f };\n    });\n  }\n  reset(){ this.setState({ filters:{} }); }\n\n  activeDims(except){\n    const f = this.state.filters;\n    return Object.keys(f).filter(d=>d!==except && f[d] && f[d].length);\n  }\n  // aggregate a dimension over rows passing all OTHER filters\n  agg(dim){\n    const { rows } = this.state.data, f = this.state.filters, dc = DIM[dim];\n    const active = this.activeDims(dim).map(d=>[DIM[d], f[d]]);\n    const map = new Map();\n    for(let i=0;i<rows.length;i++){\n      const r = rows[i]; let ok=true;\n      for(let a=0;a<active.length;a++){ if(active[a][1].indexOf(r[active[a][0]])<0){ok=false;break;} }\n      if(!ok) continue;\n      const k = r[dc]; map.set(k,(map.get(k)||0)+r[9]);\n    }\n    return [...map.entries()].sort((a,b)=>b[1]-a[1]);\n  }\n  filteredRows(){\n    const { rows } = this.state.data, f = this.state.filters;\n    const active = this.activeDims(null).map(d=>[DIM[d], f[d]]);\n    if(!active.length) return rows;\n    return rows.filter(r=>{ for(let a=0;a<active.length;a++){ if(active[a][1].indexOf(r[active[a][0]])<0) return false; } return true; });\n  }\n  selSet(dim){ return new Set(this.state.filters[dim]||[]); }\n\n  loadingBox(h){ return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'160px',color:C.muted,fontSize:'13px',animation:'dcpulse 1.4s ease-in-out infinite'}},'กำลังโหลดข้อมูล…'); }\n\n  // generic horizontal-bar chart element\n  barChart(dim, opts){\n    const h = React.createElement;\n    const { topN, group=true, uniform=C.primary, colorMap=null, labelFn, dense=false, scroll=false, scrollH=420 } = opts||{};\n    const dims = this.state.data.dims[dim];\n    let entries = this.agg(dim);\n    const totalCount = entries.length;\n    let rest = null;\n    if(topN && entries.length>topN){\n      const restVal = entries.slice(topN).reduce((s,e)=>s+e[1],0);\n      entries = entries.slice(0,topN);\n      if(group && restVal>0) rest = { n: this.state.data.dims[dim].length - topN, val: restVal };\n    }\n    const q = scroll ? (this.state.search[dim]||'').trim().toLowerCase() : '';\n    if(q){ entries = entries.filter(([idx])=>{ const raw=dims[idx]||''; const lab=labelFn?labelFn(raw):raw; return raw.toLowerCase().includes(q)||lab.toLowerCase().includes(q); }); }\n    const max = Math.max(1, ...entries.map(e=>e[1]));\n    const sel = this.selSet(dim); const anySel = sel.size>0;\n    const pad = dense ? '5px 7px' : '7px 8px';\n    const rows = entries.map(([idx,val])=>{\n      const selected = sel.has(idx);\n      let color = colorMap ? colorMap(dims[idx]) : uniform;\n      if(anySel && selected && !colorMap) color = C.accent;\n      const dim_ = anySel && !selected;\n      const label = labelFn ? labelFn(dims[idx]) : dims[idx];\n      return h('button',{ key:idx, onClick:()=>this.toggle(dim,idx),\n        onMouseEnter:e=>{e.currentTarget.style.background=C.hover;},\n        onMouseLeave:e=>{e.currentTarget.style.background='transparent';},\n        style:{display:'block',width:'100%',textAlign:'left',border:'none',background:'transparent',padding:pad,borderRadius:'8px',cursor:'pointer',fontFamily:'inherit',transition:'background .15s',opacity:dim_?0.4:1} },\n        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:'8px',marginBottom:'5px'}},\n          h('span',{style:{fontSize:'12.5px',color:selected?C.ink:'#31425c',fontWeight:selected?600:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},label),\n          h('span',{style:{fontSize:'12px',fontFamily:\"'IBM Plex Sans','IBM Plex Sans Thai'\",fontVariantNumeric:'tabular-nums',color:selected?C.accent:C.sub,fontWeight:600,flexShrink:0}},fmt(val))\n        ),\n        h('div',{style:{height:'7px',borderRadius:'999px',background:C.track,overflow:'hidden'}},\n          h('div',{style:{width:(val/max*100)+'%',height:'100%',borderRadius:'999px',background:color,transition:'width .6s cubic-bezier(.4,0,.2,1)'}})\n        )\n      );\n    });\n    if(rest){\n      rows.push(h('div',{key:'__rest',style:{padding:pad}},\n        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:'8px',marginBottom:'5px'}},\n          h('span',{style:{fontSize:'12px',color:C.muted,fontStyle:'italic'}},'อื่น ๆ ('+rest.n+' '+(dim==='nat'?'สัญชาติ':dim==='univ'?'สถาบัน':dim==='faculty'?'คณะ':'รายการ')+')'),\n          h('span',{style:{fontSize:'12px',fontFamily:\"'IBM Plex Sans'\",fontVariantNumeric:'tabular-nums',color:C.muted,fontWeight:600}},fmt(rest.val))\n        ),\n        h('div',{style:{height:'7px',borderRadius:'999px',background:C.track,overflow:'hidden'}},\n          h('div',{style:{width:(rest.val/max*100)+'%',height:'100%',borderRadius:'999px',background:'#c9d3e2'}})\n        )\n      ));\n    }\n    const listEl = h('div',{style:{display:'flex',flexDirection:'column',gap:'1px'}}, rows);\n    if(scroll){\n      const placeholders = { nat:'ค้นหาสัญชาติ…', univ:'ค้นหาสถาบัน…', faculty:'ค้นหาคณะ…', degree:'ค้นหาหลักสูตร…' };\n      return h('div',null,\n        h('input',{ value:this.state.search[dim]||'', onChange:e=>{const v=e.target.value;this.setState(s=>({search:{...s.search,[dim]:v}}));},\n          placeholder:placeholders[dim]||'ค้นหา…',\n          style:{width:'100%',fontFamily:'inherit',fontSize:'12.5px',padding:'7px 11px',border:'1px solid '+C.border,borderRadius:'8px',outline:'none',color:C.ink,background:'#f7f9fc',marginBottom:'8px'} }),\n        h('div',{style:{fontSize:'11px',color:C.muted,fontWeight:600,marginBottom:'6px',paddingLeft:'2px'}}, q ? ('พบ '+entries.length+' จาก '+totalCount+' รายการ') : ('ทั้งหมด '+entries.length+' รายการ · เลื่อนเพื่อดูเพิ่มเติม')),\n        h('div',{style:{maxHeight:scrollH+'px',overflowY:'auto',paddingRight:'4px'}}, entries.length ? listEl : h('div',{style:{padding:'22px 8px',textAlign:'center',color:C.muted,fontSize:'12.5px'}},'ไม่พบรายการที่ตรงกับการค้นหา'))\n      );\n    }\n    return listEl;\n  }\n\n  chipsEl(){\n    const h = React.createElement; const f = this.state.filters; const dims = this.state.data.dims;\n    const chips = [];\n    Object.keys(f).forEach(dim=>{ f[dim].forEach(idx=>{\n      const label = dim==='nat'? titleCaseNat(dims[dim][idx]) : dims[dim][idx];\n      chips.push(h('button',{key:dim+idx,onClick:()=>this.toggle(dim,idx),\n        style:{display:'inline-flex',alignItems:'center',gap:'7px',padding:'5px 8px 5px 11px',border:'1px solid #d6e0f2',background:'#eaf0fb',color:'#22407a',borderRadius:'999px',fontSize:'12px',fontFamily:'inherit',cursor:'pointer',fontWeight:500}},\n        h('span',{style:{color:'#7089b5',fontWeight:600}},DIM_TH[dim]+':'),\n        h('span',null,label),\n        h('span',{style:{fontSize:'14px',lineHeight:1,color:'#8ba0c7',marginLeft:'1px'}},'×')\n      ));\n    });});\n    if(!chips.length) return h('span',{style:{fontSize:'12.5px',color:C.muted}},'ยังไม่มีตัวกรอง — คลิกแท่งกราฟหรือแถวในตารางเพื่อเจาะลึกข้อมูล');\n    chips.push(h('button',{key:'__reset',onClick:()=>this.reset(),\n      style:{display:'inline-flex',alignItems:'center',gap:'5px',padding:'5px 12px',border:'1px solid #f0cdb9',background:'#fdefe6',color:'#c05a26',borderRadius:'999px',fontSize:'12px',fontFamily:'inherit',cursor:'pointer',fontWeight:600}},'ล้างทั้งหมด'));\n    return h('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px'}},chips);\n  }\n\n  genderKpi(fRows){\n    const h = React.createElement; const dims = this.state.data.dims.gender;\n    const mi = dims.indexOf('ชาย'), fi = dims.indexOf('หญิง'); const gc = DIM.gender;\n    let m=0,fe=0; for(const r of fRows){ if(r[gc]===mi) m+=r[9]; else if(r[gc]===fi) fe+=r[9]; }\n    const tot = m+fe||1;\n    return h('div',{style:{marginTop:'8px'}},\n      h('div',{style:{display:'flex',height:'12px',borderRadius:'999px',overflow:'hidden',background:C.track}},\n        h('div',{style:{width:(m/tot*100)+'%',background:GENDER_COLORS['ชาย'],transition:'width .5s'}}),\n        h('div',{style:{width:(fe/tot*100)+'%',background:GENDER_COLORS['หญิง'],transition:'width .5s'}})\n      ),\n      h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:'9px',fontSize:'12.5px'}},\n        h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},\n          h('span',{style:{width:'8px',height:'8px',borderRadius:'2px',background:GENDER_COLORS['ชาย']}}),\n          h('span',{style:{color:C.sub}},'ชาย '),\n          h('b',{style:{fontFamily:\"'IBM Plex Sans'\",fontVariantNumeric:'tabular-nums'}},fmt(m)),\n          h('span',{style:{color:C.muted}},' ('+Math.round(m/tot*100)+'%)')\n        ),\n        h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},\n          h('span',{style:{width:'8px',height:'8px',borderRadius:'2px',background:GENDER_COLORS['หญิง']}}),\n          h('span',{style:{color:C.sub}},'หญิง '),\n          h('b',{style:{fontFamily:\"'IBM Plex Sans'\",fontVariantNumeric:'tabular-nums'}},fmt(fe)),\n          h('span',{style:{color:C.muted}},' ('+Math.round(fe/tot*100)+'%)')\n        )\n      )\n    );\n  }\n\n  tableEl(fRows){\n    const h = React.createElement; const dims = this.state.data.dims;\n    const uc=DIM.univ, tc=DIM.type, gc=DIM.gender, lc=DIM.level;\n    const mi=dims.gender.indexOf('ชาย'), fi=dims.gender.indexOf('ห
