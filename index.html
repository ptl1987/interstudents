document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n  return s.toLowerCase().replace(/(^|[\\s/,\\-])([a-z])/g, (m,p,c)=>p+c.toUpperCase());\n}\n\nclass Component extends DCLogic {\n  state = { data:null, err:null, filters:{}, univSearch:'' };\n\n  componentDidMount(){ this.loadData(0); }\n  loadData(tries){\n    if(window.__STUDENT_DATA){ this.setState({data:window.__STUDENT_DATA}); return; }\n    if(tries<50){ setTimeout(()=>this.loadData(tries+1), 80); return; }\n    fetch('data/records.json').then(r=>r.json()).then(data=>this.setState({data}))\n      .catch(e=>this.setState({err:String(e)}));\n  }\n\n  toggle(dim, idx){\n    this.setState(s=>{\n      const f = {...s.filters};\n      const cur = f[dim] ? [...f[dim]] : [];\n      const at = cur.indexOf(idx);\n      if(at>=0) cur.splice(at,1); else cur.push(idx);\n      if(cur.length) f[dim] = cur; else delete f[dim];\n      return { filters:f };\n    });\n  }\n  reset(){ this.setState({ filters:{} }); }\n\n  activeDims(except){\n    const f = this.state.filters;\n    return Object.keys(f).filter(d=>d!==except && f[d] && f[d].length);\n  }\n  // aggregate a dimension over rows passing all OTHER filters\n  agg(dim){\n    const { rows } = this.state.data, f = this.state.filters, dc = DIM[dim];\n    const active = this.activeDims(dim).map(d=>[DIM[d], f[d]]);\n    const map = new Map();\n    for(let i=0;i<rows.length;i++){\n      const r = rows[i]; let ok=true;\n      for(let a=0;a<active.length;a++){ if(active[a][1].indexOf(r[active[a][0]])<0){ok=false;break;} }\n      if(!ok) continue;\n      const k = r[dc]; map.set(k,(map.get(k)||0)+r[9]);\n    }\n    return [...map.entries()].sort((a,b)=>b[1]-a[1]);\n  }\n  filteredRows(){\n    const { rows } = this.state.data, f = this.state.filters;\n    const active = this.activeDims(null).map(d=>[DIM[d], f[d]]);\n    if(!active.length) return rows;\n    return rows.filter(r=>{ for(let a=0;a<active.length;a++){ if(active[a][1].indexOf(r[active[a][0]])<0) return false; } return true; });\n  }\n  selSet(dim){ return new Set(this.state.filters[dim]||[]); }\n\n  loadingBox(h){ return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'160px',color:C.muted,fontSize:'13px',animation:'dcpulse 1.4s ease-in-out infinite'}},'กำลังโหลดข้อมูล…'); }\n\n  // generic horizontal-bar chart element\n  barChart(dim, opts){\n    const h = React.createElement;\n    const { topN, group=true, uniform=C.primary, colorMap=null, labelFn, dense=false } = opts||{};\n    const dims = this.state.data.dims[dim];\n    let entries = this.agg(dim);\n    let rest = null;\n    if(topN && entries.length>topN){\n      const restVal = entries.slice(topN).reduce((s,e)=>s+e[1],0);\n      entries = entries.slice(0,topN);\n      if(group && restVal>0) rest = { n: this.state.data.dims[dim].length - topN, val: restVal };\n    }\n    const max = Math.max(1, ...entries.map(e=>e[1]));\n    const sel = this.selSet(dim); const anySel = sel.size>0;\n    const pad = dense ? '5px 7px' : '7px 8px';\n    const rows = entries.map(([idx,val])=>{\n      const selected = sel.has(idx);\n      let color = colorMap ? colorMap(dims[idx]) : uniform;\n      if(anySel && selected && !colorMap) color = C.accent;\n      const dim_ = anySel && !selected;\n      const label = labelFn ? labelFn(dims[idx]) : dims[idx];\n      return h('button',{ key:idx, onClick:()=>this.toggle(dim,idx),\n        onMouseEnter:e=>{e.currentTarget.style.background=C.hover;},\n        onMouseLeave:e=>{e.currentTarget.style.background='transparent';},\n        style:{display:'block',width:'100%',textAlign:'left',border:'none',background:'transparent',padding:pad,borderRadius:'8px',cursor:'pointer',fontFamily:'inherit',transition:'background .15s',opacity:dim_?0.4:1} },\n        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:'8px',marginBottom:'5px'}},\n          h('span',{style:{fontSize:'12.5px',color:selected?C.ink:'#31425c',fontWeight:selected?600:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'el         ),\n        h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},\n          h('span',{style:{width:'8px',height:'8px',borderRadius:'2px',background:GENDER_COLORS['หญิง']}}),\n          h('span',{style:{color:C.sub}},'หญิง '),\n          h('b',{style:{fontFamily:\"'IBM Plex Sans'\",fontVariantNumeric:'tabular-nums'}},fmt(fe)),\n          h('span',{style:{color:C.muted}},' ('+Math.round(fe/tot*100)+'%)')\n        )\n      )\n    );\n  }\n\n  tableEl(fRows){\n    const h = React.createElement; const dims = this.state.data.dims;\n    const uc=DIM.univ, tc=DIM.type, gc=DIM.gender, lc=DIM.level;\n    const mi=dims.gender.indexOf('ชาย'), fi=dims.gender.indexOf('หญิง');\n    const li1=dims.level.indexOf('ป.ตรี'), li2=dims.level.indexOf('ป.โท'), li3=dims.level.indexOf('ป.เอก');\n    const m = new Map();\n    for(const r of fRows){\n      let o = m.get(r[uc]); if(!o){ o={tot:0,ch:0,ny:0,l1:0,l2:0,l3:0,type:dims.type[r[tc]]}; m.set(r[uc],o); }\n      const c=r[9]; o.tot+=c;\n      if(r[gc]===mi) o.ch+=c; else if(r[gc]===fi) o.ny+=c;\n      if(r[lc]===li1) o.l1+=c; else if(r[lc]===li2) o.l2+=c; else if(r[lc]===li3) o.l3+=c;\n    }\n    let arr = [...m.entries()].map(([idx,o])=>({idx,name:dims.univ[idx],...o}));\n    const q = this.state.univSearch.trim().toLowerCase();\n    if(q) arr = arr.filter(a=>a.name.toLowerCase().includes(q));\n    arr.sort((a,b)=>b.tot-a.tot);\n    const shown = arr.slice(0,30);\n    const sel = this.selSet('univ');\n    const th=(t,al)=>h('th',{style:{textAlign:al||'right',padding:'9px 12px',fontSize:'11.5px',color:C.muted,fontWeight:600,whiteSpace:'nowrap',position:'sticky',top:0,background:'#f7f9fc',borderBottom:'1px solid '+C.border}},t);\n    const num=(v,c)=>h('td',{style:{textAlign:'right',padding:'9px 12px',fontSize:'12.5px',fontFamily:\"'IBM Plex Sans'\",fontVariantNumeric:'tabular-nums',color:c||C.sub,whiteSpace:'nowrap'}},v?fmt(v):'–');\n    const rows = shown.map((a,i)=>{\n      const selected = sel.has(a.idx);\n      return h('tr',{key:a.idx,onClick:()=>this.toggle('univ',a.idx),\n        onMouseEnter:e=>{if(!selected)e.currentTarget.style.background=C.hover;},\n        onMouseLeave:e=>{if(!selected)e.currentTarget.style.background='transparent';},\n        style:{cursor:'pointer',background:selected?'#eaf0fb':'transparent',borderBottom:'1px solid #f0f3f8'}},\n        h('td',{style:{padding:'9px 12px',fontSize:'12px',color:C.muted,fontFamily:\"'IBM Plex Sans'\",width:'34px'}},i+1),\n        h('td',{style:{padding:'9px 12px',fontSize:'12.5px',color:selected?C.ink:'#31425c',fontWeight:selected?600:500,maxWidth:'340px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},a.name),\n        h('td',{style:{padding:'9px 12px',fontSize:'11.5px',color:C.muted,whiteSpace:'nowrap'}},a.type),\n        num(a.tot,C.ink), num(a.ch), num(a.ny), num(a.l1), num(a.l2), num(a.l3)\n      );\n    });\n    return h('div',{style:{overflow:'auto',maxHeight:'440px',border:'1px solid #eef2f8',borderRadius:'10px'}},\n      h('table',{style:{width:'100%',borderCollapse:'collapse'}},\n        h('thead',null,h('tr',null,th('#','left'),th('สถาบัน','left'),th('ประเภท','left'),th('รวม'),th('ชาย'),th('หญิง'),th('ป.ตรี'),th('ป.โท'),th('ป.เอก'))),\n        h('tbody',null, rows.length?rows:h('tr',null,h('td',{colSpan:9,style:{padding:'24px',textAlign:'center',color:C.muted,fontSize:'13px'}},'ไม่พบสถาบันที่ตรงกับการค้นหา')))\n      )\n    );\n  }\n\n  renderVals(){\n    const h = React.createElement;\n    const period = 'ปีการศึกษา 2568 ภาคการศึกษาที่ 2';\n    if(this.state.err){\n      const errEl = h('div',{style:{padding:'40px',textAlign:'center',color:'#c05a26',fontSize:'13px'}},'โหลดข้อมูลไม่สำเร็จ');\n      return { period, kpiTotal:'—', kpiTotalNote:'', kpiNat:'—', kpiUniv:'—', baseTotal:'—', baseNat:'—', baseUniv:'—',\n        chipsEl:'', genderKpiEl:'', univSearch:'', onUnivSearch:()=>{},\n        natChartEl:errEl, levelChartEl:'', masterChartEl:'', typeChartEl:'', yearChartEl:'', genderChartEl:'', univChartEl:'', facChartEl:'', degChartEl:'', tableEl:'' };\n    }\n    if(!this.state.data){\n      const L = this.loadingBox(h);\n      return { period, kpiTotal:'—', kpiTotalNote:'กำลังโหลด…', kpiNat:'—', kpiUniv:'—', baseTotal:'…', baseNat:'…', baseUniv:'…',\n        chipsEl:h('span',{style:{fontSize:'12.5px',color:C.muted}},'กำลังโหลด…'), genderKpiEl:'', univSearch:'', onUnivSearch:()=>{},\n        natChartEl:L, levelChartEl:L, masterChartEl:L, typeChartEl:L, yearChartEl:L, genderChartEl:L, univChartEl:L, facChartEl:L, degChartEl:L, tableEl:L };\n    }\n\n    const meta = this.state.data.meta;\n    const fRows = this.filteredRows();\n    let total=0; const natS=new Set(), univS=new Set();\n    for(const r of fRows){ total+=r[9]; natS.add(r[DIM.nat]); univS.add(r[DIM.univ]); }\n    const filtered = this.activeDims(null).length>0;\n\n    return {\n      period,\n      kpiTotal: fmt(total),\n      kpiTotalNote: filtered ? ('จากทั้งหมด '+fmt(meta.total)+' คน ('+Math.round(total/meta.total*100)+'%)') : 'ข้อมูลทั้งหมด',\n      kpiNat: fmt(natS.size),\n      kpiUniv: fmt(univS.size),\n      baseTotal: fmt(meta.total), baseNat: this.state.data.dims.nat.length, baseUniv: this.state.data.dims.univ.length,\n      chipsEl: this.chipsEl(),\n      genderKpiEl: this.genderKpi(fRows),\n      univSearch: this.state.univSearch,\n      onUnivSearch: e=>this.setState({univSearch:e.target.value}),\n      natChartEl: this.barChart('nat',{topN:15,labelFn:titleCaseNat}),\n      levelChartEl: this.barChart('level',{}),\n      masterChartEl: this.barChart('master',{}),\n      typeChartEl: this.barChart('type',{colorMap:l=>TYPE_COLORS[l]||C.primary}),\n      yearChartEl: this.barChart('year',{}),\n      genderChartEl: this.barChart('gender',{colorMap:l=>GENDER_COLORS[l]||C.primary}),\n      univChartEl: this.barChart('univ',{topN:15,dense:true}),\n      facChartEl: this.barChart('faculty',{topN:15,dense:true}),\n      degChartEl: this.barChart('degree',{topN:12,dense:true}),\n      tableEl: this.tableEl(fRows)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
