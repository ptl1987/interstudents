  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

: swap;\n  src: url(\"4e5b51b5-7dc5-4cc0-a028-0102555890ba\") format('woff2');\n  unicode-range: U+02D7, U+0303, U+0331, U+0E01-0E5B, U+200C-200D, U+25CC;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Noto Sans Thai';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"0f21091d-5994-4d8b-bf5b-78861ef07816\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Noto Sans Thai';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"fda44019-8b77-44cb-a3e0-40bd20c4d83b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* thai */\n@font-face {\n  font-family: 'Noto Sans Thai';\n  font-style: normal;\n  font-weight: 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"4e5b51b5-7dc5-4cc0-a028-0102555890ba\") format('woff2');\n  unicode-range: U+02D7, U+0303, U+0331, U+0E01-0E5B, U+200C-200D, U+25CC;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Noto Sans Thai';\n  font-style: normal;\n  font-weight: 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"0f21091d-5994-4d8b-bf5b-78861ef07816\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Noto Sans Thai';\n  font-style: normal;\n  font-weight: 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"fda44019-8b77-44cb-a3e0-40bd20c4d83b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\nbody{margin:0;background:#F4F2ED;font-family:'Noto Sans Thai',system-ui,sans-serif;color:#1C2733;-webkit-font-smoothing:antialiased}\n*{box-sizing:border-box}\ninput{font-family:'Noto Sans Thai',system-ui,sans-serif}\n@keyframes growBar{from{width:0}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Dashboard\" style=\"min-height:100vh\">\n\n  <!-- ═══ Header ═══ -->\n  <div style=\"background:#122A36;color:#fff;padding:28px 32px 24px\">\n    <div style=\"max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:18px\">\n        <img src=\"75c5d989-0997-42b7-85ff-2a7243ed1de8\" alt=\"กระทรวงการอุดมศึกษา วิทยาศาสตร์ วิจัยและนวัตกรรม\" style=\"width:64px;height:64px;object-fit:contain;background:#fff;border-radius:50%;padding:4px;flex-shrink:0\">\n        <div>\n        <div style=\"font-size:12px;letter-spacing:0.5px;font-weight:600;color:rgba(255,255,255,0.7)\">กระทรวงการอุดมศึกษา วิทยาศาสตร์ วิจัยและนวัตกรรม<\u002Fdiv>\n        <h1 style=\"margin:4px 0 4px;font-size:26px;font-weight:800;line-height:1.25\">นักศึกษาต่างชาติในสถาบันอุดมศึกษาไทย<\u002Fh1>\n        <div style=\"font-size:13px;color:rgba(255,255,255,0.65)\">วิเคราะห์ตามสัญชาติ · สถาบัน · ระดับการศึกษา · คณะและหลักสูตร — ข้อมูลรายงาน ณ 21 พฤษภาคม 2569<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:28px\">\n        <sc-for list=\"{{kpis}}\" as=\"k\" hint-placeholder-count=\"4\">\n          <div style=\"text-align:right\">\n            <div style=\"font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1\">{{k.value}}<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(255,255,255,0.6)\">{{k.label}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══ Filter bar ═══ -->\n  <div style=\"background:#fff;border-bottom:1px solid #E2DED5;padding:14px 32px\">\n    <div style=\"max-width:1240px;margin:0 auto;display:flex;flex-direction:column;gap:10px\">\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n        <div style=\"font-size:12px;font-weight:700;color:#8A857A;width:86px\">กลุ่มสถาบัน<\u002Fdiv>\n        <sc-for list=\"{{ugChips}}\" as=\"c\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{c.onClick}}\" style=\"border:1px solid {{c.bd}};background:{{c.bg}};color:{{c.fg}};border-radius:99px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;gap:7px;align-items:center\" style-hover=\"border-color:#122A36\">\n            <span>{{c.label}}<\u002Fspan><span style=\"font-weight:500;opacity:0.65;font-variant-numeric:tabular-nums;font-size:12px\">{{c.cnt}}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n        <div style=\"font-size:12px;font-weight:700;color:#8A857A;width:86px\">ระดับการศึกษา<\u002Fdiv>\n        <sc-for list=\"{{levelChips}}\" as=\"c\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{c.onClick}}\" style=\"border:1px solid {{c.bd}};background:{{c.bg}};color:{{c.fg}};border-radius:99px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;gap:7px;align-items:center\" style-hover=\"border-color:#122A36\">\n            <span>{{c.label}}<\u002Fspan><span style=\"font-weight:500;opacity:0.65;font-variant-numeric:tabular-nums;font-size:12px\">{{c.cnt}}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n        <div style=\"font-size:12px;font-weight:700;color:#8A857A;width:86px\">เพศ<\u002Fdiv>\n        <sc-for list=\"{{genderChips}}\" as=\"c\" hint-placeholder-count=\"2\">\n          <button onclick=\"{{c.onClick}}\" style=\"border:1px solid {{c.bd}};background:{{c.bg}};color:{{c.fg}};border-radius:99px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;gap:7px;align-items:center\" style-hover=\"border-color:#122A36\">\n            <span>{{c.label}}<\u002Fspan><span style=\"font-weight:500;opacity:0.65;font-variant-numeric:tabular-nums;font-size:12px\">{{c.cnt}}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n        <sc-if value=\"{{hasFilters}}\" hint-placeholder-val=\"{{false}}\">\n          <button onclick=\"{{clearFilters}}\" style=\"border:none;background:none;color:#B0492F;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;padding:5px 10px\" style-hover=\"text-decoration:underline\">✕ ล้างตัวกรองทั้งหมด<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══ Tabs ═══ -->\n  <div style=\"background:#fff;border-bottom:1px solid #E2DED5;padding:0 32px\">\n    <div style=\"max-width:1240px;margin:0 auto;display:flex;gap:4px\">\n      <sc-for list=\"{{tabs}}\" as=\"t\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{t.onClick}}\" style=\"border:none;background:none;padding:13px 18px 11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:{{t.fg}};border-bottom:3px solid {{t.line}}\" style-hover=\"color:#122A36\">{{t.label}}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1240px;margin:0 auto;padding:28px 32px 60px\">\n\n    <sc-if value=\"{{loading}}\" hint-placeholder-val=\"{{false}}\">\n      <div style=\"padding:80px;text-align:center;color:#8A857A;font-size:15px\">กำลังโหลดข้อมูล…<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ TAB: ภาพรวม ═══ -->\n    <sc-if value=\"{{isOverview}}\" hint-placeholder-val=\"{{true}}\">\n      <div data-screen-label=\"ภาพรวม\" style=\"display:grid;grid-template-columns:7fr 5fr;gap:20px;align-items:start\">\n\n        <div style=\"background:#fff;border:1px solid #E2DED5;border-radius:10px;padding:22px 24px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px\">\n            <h2 style=\"margin:0;font-size:16px;font-weight:800\">สัญชาติที่มีนักศึกษามากที่สุด<\u002Fh2>\n            <div style=\"font-size:12px;color:#8A857A\">{{topNLabel}} อันดับแรก · คลิกเพื่อดูรายละเอียด<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#8A857A;margin-bottom:16px\">{{natShare}}<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{natBars}}\" as=\"b\" hint-placeholder-count=\"10\">\n              <div onclick=\"{{b.onClick}}\" style=\"display:grid;grid-template-columns:150px 1fr 110px;gap:12px;align-items:center;cursor:pointer;border-radius:6px;padding:2px 4px;background:{{b.rowBg}}\" style-hover=\"background:#F4F2ED\">\n                <div style=\"font-size:13px;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{b.name}}<\u002Fdiv>\n                <div style=\"height:20px;background:#EFECE5;border-radius:4px;overflow:hidden\"><div style=\"height:100%;border-radius:4px;background:{{b.color}};width:{{b.w}};animation:growBar 0.5s ease-out\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:13px;font-variant-numeric:tabular-nums\"><span style=\"font-weight:700\">{{b.cnt}}<\u002Fspan> <span style=\"color:#8A857A;font-size:12px\">{{b.pct}}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:20px\">\n          <div style=\"background:#fff;border:1px solid #E2DED5;border-radius:10px;padding:22px 24px\">\n            <h2 style= und:#fff;border:1px solid #E2DED5;border-radius:10px;padding:22px 24px\">\n          <h2 style=\"margin:0 0 4px;font-size:16px;font-weight:800\">คณะ/สำนักวิชาที่มีนักศึกษาต่างชาติมากที่สุด<\u002Fh2>\n          <div style=\"font-size:12px;color:#8A857A;margin-bottom:12px\">รวมทุกสถาบัน · {{facCount}} คณะที่มีนักศึกษาต่างชาติ · เรียงมาก→น้อย<\u002Fdiv>\n          <input value=\"{{facQ}}\" onchange=\"{{onFacQ}}\" placeholder=\"ค้นหาคณะ/สำนักวิชา…\" style=\"width:100%;border:1px solid #DDD8CC;border-radius:8px;padding:9px 14px;font-size:13.5px;margin-bottom:14px;outline:none;background:#FAF8F4\">\n          <div style=\"display:flex;flex-direction:column;gap:8px;max-height:640px;overflow-y:auto;padding-right:6px\">\n            <sc-for list=\"{{facBars}}\" as=\"b\" hint-placeholder-count=\"12\">\n              <div style=\"display:grid;grid-template-columns:230px 1fr 110px;gap:12px;align-items:center\">\n                <div style=\"font-size:12.5px;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{b.name}}<\u002Fdiv>\n                <div style=\"height:18px;background:#EFECE5;border-radius:4px;overflow:hidden\"><div style=\"height:100%;border-radius:4px;background:{{b.color}};width:{{b.w}};animation:growBar 0.5s ease-out\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:13px;font-variant-numeric:tabular-nums\"><span style=\"font-weight:700\">{{b.cnt}}<\u002Fspan> <span style=\"color:#8A857A;font-size:11.5px\">{{b.pct}}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px\">\n          <div style=\"background:#fff;border:1px solid #E2DED5;border-radius:10px;padding:22px 24px\">\n            <h2 style=\"margin:0 0 4px;font-size:16px;font-weight:800\">ปริญญา/หลักสูตร<\u002Fh2>\n            <div style=\"font-size:12px;color:#8A857A;margin-bottom:12px\">{{degreeCount}} หลักสูตร · เรียงมาก→น้อย<\u002Fdiv>\n            <input value=\"{{degQ}}\" onchange=\"{{onDegQ}}\" placeholder=\"ค้นหาหลักสูตร…\" style=\"width:100%;border:1px solid #DDD8CC;border-radius:8px;padding:9px 14px;font-size:13.5px;margin-bottom:14px;outline:none;background:#FAF8F4\">\n            <div style=\"display:flex;flex-direction:column;gap:7px;max-height:420px;overflow-y:auto;padding-right:6px\">\n              <sc-for list=\"{{degreeBars}}\" as=\"b\" hint-placeholder-count=\"8\">\n                <div style=\"display:grid;grid-template-columns:1fr 130px;gap:10px;align-items:center\">\n                  <div style=\"font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{b.name}}<\u002Fdiv>\n                  <div style=\"display:flex;gap:8px;align-items:center\"><div style=\"flex:1;height:10px;background:#EFECE5;border-radius:3px;overflow:hidden\"><div style=\"height:100%;background:{{b.color}};width:{{b.w}}\"><\u002Fdiv><\u002Fdiv><div style=\"font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;width:44px;text-align:right\">{{b.cnt}}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E2DED5;border-radius:10px;padding:22px 24px\">\n            <h2 style=\"margin:0 0 14px;font-size:16px;font-weight:800\">ชั้นปีที่กำลังศึกษา<\u002Fh2>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{classBars}}\" as=\"b\" hint-placeholder-count=\"5\">\n                <div style=\"display:grid;grid-template-columns:110px 1fr 105px;gap:10px;align-items:center\">\n                  <div style=\"font-size:13px;font-weight:600;text-align:right\">{{b.name}}<\u002Fdiv>\n                  <div style=\"height:14px;background:#EFECE5;border-radius:4px;overflow:hidden\"><div style=\"height:100%;border-radius:4px;background:{{b.color}};width:{{b.w}}\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-size:12.5px;font-variant-numeric:tabular-nums\"><span style=\"font-weight:700\">{{b.cnt}}<\u002Fspan> <span style=\"color:#8A857A;font-size:11.5px\">{{b.pct}}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ TAB: ตารางข้อมูล ═══ -->\n    <sc-if value=\"{{isTable}}\" hint-placeholder-val=\"{{false}}\">\n      <div data-screen-label=\"ตารางข้อมูล\" style=\"background:#fff;border:1px solid #E2DED5;border-radius:10px;padding:22px 24px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px\">\n          <h2 style=\"margin:0;font-size:16px;font-weight:800\">ตารางข้อมูล: สัญชาติ × สถาบัน × ระดับ<\u002Fh2>\n          <div style=\"font-size:12.5px;color:#8A857A\">{{tableInfo}}<\u002Fdiv>\n        <\u002Fdiv>\n        <input value=\"{{tableQ}}\" onchange=\"{{onTableQ}}\" placeholder=\"ค้นหาสัญชาติหรือสถาบัน…\" style=\"width:100%;border:1px solid #DDD8CC;border-radius:8px;padding:9px 14px;font-size:13.5px;margin-bottom:14px;outline:none;background:#FAF8F4\">\n        <div style=\"display:grid;grid-template-columns:44px 1.1fr 1.6fr 90px 90px;gap:10px;padding:8px 10px;border-bottom:2px solid #1C2733;font-size:12px;font-weight:800;color:#5A6472\">\n          <div>#<\u002Fdiv><div>สัญชาติ<\u002Fdiv><div>สถาบัน<\u002Fdiv><div>ระดับ<\u002Fdiv><div style=\"text-align:right\">จำนวน (คน)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"max-height:600px;overflow-y:auto\">\n          <sc-for list=\"{{tableRows}}\" as=\"r\" hint-placeholder-count=\"15\">\n            <div style=\"display:grid;grid-template-columns:44px 1.1fr 1.6fr 90px 90px;gap:10px;padding:8px 10px;border-bottom:1px solid #EFECE5;font-size:13px;align-items:center\" style-hover=\"background:#FAF8F4\">\n              <div style=\"color:#B3ADA0;font-variant-numeric:tabular-nums;font-size:12px\">{{r.rank}}<\u002Fdiv>\n              <div style=\"font-weight:600\">{{r.nat}}<\u002Fdiv>\n              <div style=\"color:#3A4552\">{{r.univ}}<\u002Fdiv>\n              <div>{{r.level}}<\u002Fdiv>\n              <div style=\"text-align:right;font-weight:700;font-variant-numeric:tabular-nums\">{{r.cnt}}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"margin-top:28px;font-size:12px;color:#8A857A;line-height:1.7\">\nที่มาข้อมูล: กองระบบและบริหารข้อมูลเชิงยุทธศาสตร์การอุดมศึกษา วิทยาศาสตร์ วิจัยและนวัตกรรม สป.อว. · หน่วยนับ: จำนวนนักศึกษา (คน) จากรายการรายงานของสถาบัน 14,835 รายการ · ตัวกรองด้านบนมีผลกับทุกมุมมอง\n      <div style=\"margin-top:10px;padding-top:10px;border-top:1px solid #E2DED5;font-weight:600;color:#5A6472\">นำเสนอโดย กลุ่มขับเคลื่อน อววน. ระหว่างประเทศ กองการต่างประเทศ สำนักงานปลัดกระทรวงการอุดมศึกษา วิทยาศาสตร์ วิจัยและนวัตกรรม<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0E7C66&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#0E7C66&quot;,&quot;#2A6FDB&quot;,&quot;#C75B39&quot;,&quot;#7A5FBF&quot;],&quot;section&quot;:&quot;ธีม&quot;},&quot;topN&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:20,&quot;min&quot;:5,&quot;max&quot;:30,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;การแสดงผล&quot;},&quot;showPct&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;การแสดงผล&quot;}}\">\nclass Component extends DCLogic {\n  state = { db: null, tab: 'overview', ug: null, level: null, gender: null, natQ: '', univQ: '', tableQ: '', facQ: '', degQ: '', selNat: null, selUniv: null };\n\n  componentDidMount() {\n    fetch((window.__resources && window.__resources.studentsData) || 'data/students.json').then(r => r.json()).then(db => this.setState({ db }));\n  }\n\n  renderVals() {\n    const accent = this.props.accent ?? '#0E7C66';\n    const topN = this.props.topN ?? 10;\n    const showPct = this.props.showPct ?? true;\n    const S = this.state;\n    const db = S.db;\n    const fmt = n => n.toLocaleString('th-TH');\n    const PAL = [accent, '#2A6FDB', '#C75B39', '#7A5FBF', '#B08A22', '#4A8FA3', '#B04A6E', '#5B7553', '#8A6BAE', '#3E7CB1'];\n    const set = (patch) => () => this.setState(patch);\n    const toggle = (key, v) => () => this.setState(s => ({ [key]: s[key] === v ? null : v }));\n\n    const tabs = [\n      { id: 'overview', label: 'ภาพรวม' }, { id: 'nat', label: 'สัญชาติ' }, { id: 'univ', label: 'สถาบัน' },\n      { id: 'fac', label: 'คณะและหลักสูตร' }, { id: 'table', label: 'ตารางข้อมูล' }\n    ].map(t => ({\n      ...t, onClick: set({ tab: t.id }),\n      fg: S.tab === t.id ? '#122A36' : '#8A857A',\n      line: S.tab === t.id ? accent : 'transparent'\n    }));\n\n    const base = {\n      accent, accentSoft: '#7FC8B5', tabs, topNLabel: topN,\n      loading: !db, isOverview: db && S.tab === 'overview', isNat: db && S.tab === 'nat',\n      isUniv: db && S.tab === 'univ', isFac: db && S.tab === 'fac', isTable: db && S.tab === 'table',\n      natQ: S.natQ, univQ: S.univQ, tableQ: S.tableQ, facQ: S.facQ, degQ: S.degQ,\n      onNatQ: e => this.setState({ natQ: e.target.value }),\n      onUnivQ: e => this.setState({ univQ: e.target.value }),\n      onTableQ: e => this.setState({ tableQ: e.target.value }),\n      onFacQ: e => this.setState({ facQ: e.target.value }),\n      onDegQ: e => this.setState({ degQ: e.target.value }),\n      clearFilters: set({ ug: null, level: null, gender: null }),\n      hasFilters: S.ug != null || S.level != null || S.gender != null,\n      noNatSel: S.selNat == null, noUnivSel: S.selUniv == null,\n      natSelName: null, univSelName: null,\n      kpis: [], ugChips: [], levelChips: [], genderChips: [], natBars: [], levelBars: [], genderSeg: [], ugCards: [],\n      natList: [], natCount: '', univList: [], univCount: '', utypeCards: [], facBars: [], facCount: '', degreeCount: '',\n      degreeBars: [], classBars: [], tableRows: [], tableInfo: '', natShare: '',\n      closeNat: set({ selNat: null }), closeUniv: set({ selUniv: null })\n    };\n    if (!db) return base;\n\n    const D = db.dims;\n    // filtered records (global filters)\n    const match = (r, skip) =>\n      (skip === 'ug' || S.ug == null || r[1] === S.ug) &&\n      (skip === 'level' || S.level == null || r[6] === S.level) &&\n      (skip === 'gender' || S.gender == null || r[5] === S.gender);\n    const recs = db.records.filter(r => match(r));\n    const total = recs.reduce((a, r) => a + r[10], 0) || 1;\n\n    const agg = (rows, idx) => {\n      const m = new Map();\n      for (const r of rows) m.set(r[idx], (m.get(r[idx]) || 0) + r[10]);\n      return [...m.entries()].sort((a, b) => b[1] - a[1]);\n    };\n    const pctS = (c, t) => showPct ? (100 * c / t).toFixed(1) + '%' : '';\n    const bars = (pairs, dim, tot, opts = {}) => {\n      const max = pairs.length ? pairs[0][1] : 1;\n      return pairs.map(([i, c], k) => ({\n        name: dim[i], cnt: fmt(c), pct: pctS(c, tot), rank: k + 1,\n        w: Math.max(1.5, 100 * c / max) + '%',\n        color: opts.mono ? accent : PAL[k % PAL.length],\n        rowBg: opts.selKey != null && S[opts.selKey] === i ? '#EAF3EF' : 'transparent',\n        onClick: opts.selKey ? toggle(opts.selKey, i) : undefined\n      }));\n    };\n\n    // chips (counts computed with other filters applied)\n    const chip = (key, dimIdx, dim, order) => {\n      const rows = db.records.filter(r => match(r, key));\n      const m = new Map();\n      for (const r of rows) m.set(r[dimIdx], (m.get(r[dimIdx]) || 0) + r[10]);\n      const ids = order || [...m.keys()].sort((a, b) => (m.get(b) || 0) - (m.get(a) || 0));\n      return ids.filter(i => m.has(i)).map(i => {\n        const on = S[key] === i;\n        return {\n          label: dim[i], cnt: fmt(m.get(i) || 0), onClick: toggle(key, i),\n          bg: on ? '#122A36' : '#fff', fg: on ? '#fff' : '#3A4552', bd: on ? '#122A36' : '#DDD8CC'\n        };\n      });\n    };\n\n    // KPIs\n    const kpis = [\n      { label: 'นักศึกษาต่างชาติ (คน)', value: fmt(total === 1 ? 0 : total) },\n      { label: 'สัญชาติ', value: fmt(new Set(recs.map(r => r[0])).size) },\n      { label: 'สถาบัน', value: fmt(new Set(recs.map(r => r[3])).size) },\n      { label: 'คณะ/สำนักวิชา', value: fmt(new Set(recs.map(r => r[7])).size) }\n    ];\n\n    // overview\n    const natAgg = agg(recs, 0);\n    const natBars = bars(natAgg.slice(0, topN), D.nat, total, { selKey: 'selNat' }).map(b => ({\n      ...b, onClick: (() => { const i = natAgg[b.rank - 1][0]; return () => this.setState({ selNat: i, tab: 'nat' }); })()\n    }));\n    const topShare = natAgg.slice(0, topN).reduce((a, [, c]) => a + c, 0);\n    const natShare = `${topN} อันดับแรกคิดเป็น ${(100 * topShare / total).toFixed(1)}% ของนักศึกษาต่างชาติทั้งหมด`;\n\n    const levelOrder = [0, 1, 2, 3, 4, 5, 6, 7].filter(i => D.level[i] != null);\n    const levelAgg = agg(recs, 6);\n    const levelBars = bars(levelAgg, D.level, total, { mono: false });\n\n    const gAgg = agg(recs, 5);\n    const gTot = gAgg.reduce((a, [, c]) => a + c, 0) || 1;\n    const GCOL = { 'ชาย': '#2A6FDB', 'หญิง': '#B04A6E' };\n    const genderSeg = gAgg.map(([i, c]) => ({\n      label: D.gender[i], cnt: fmt(c), pct: (100 * c / gTot).toFixed(1) + '%',\n      w: (100 * c / gTot) + '%', color: GCOL[D.gender[i]] || accent\n    }));\n\n    const ugAgg = agg(recs, 1).sort((a, b) => [1, 0, 2].indexOf(a[0]) - [1, 0, 2].indexOf(b[0]));\n    const ugCards = ugAgg.map(([i, c]) => ({ name: D.ug[i], cnt: fmt(c), pct: pctS(c, total) }));\n\n    // nationality tab\n    const q = S.natQ.trim().toUpperCase();\n    const natFiltered = natAgg.filter(([i]) => !q || D.nat[i].toUpperCase().includes(q));\n    const natList = natFiltered.slice(0, 168).map(([i, c], k) => ({\n      rank: natAgg.findIndex(p => p[0] === i) + 1, name: D.nat[i], cnt: fmt(c), pct: pctS(c, total),\n      w: Math.max(1, 100 * c / (natAgg[0] ? natAgg[0][1] : 1)) + '%', color: accent,\n      rowBg: S.selNat === i ? '#E7F1ED' : 'transparent', onClick: toggle('selNat', i)\n    }));\n\n    let natSel = {};\n    if (S.selNat != null) {\n      const nr = recs.filter(r => r[0] === S.selNat);\n      const nt = nr.reduce((a, r) => a + r[10], 0) || 1;\n      natSel = {\n        natSelName: D.nat[S.selNat], natSelTotal: fmt(nt), natSelPct: (100 * nt / total).toFixed(2) + '%',\n        natSelUnivs: bars(agg(nr, 3).slice(0, 8), D.umaster, nt, { mono: true }),\n        natSelLevels: agg(nr, 6).map(([i, c]) => ({ name: D.level[i], cnt: fmt(c), pct: pctS(c, nt) })),\n        natSelGender: agg(nr, 5).map(([i, c]) => ({ name: D.gender[i], cnt: fmt(c), pct: pctS(c, nt) })),\n        natSelFacs: agg(nr, 7).slice(0, 6).map(([i, c]) => ({ name: D.fac[i], cnt: fmt(c) }))\n      };\n    }\n\n    // institution tab\n    const utypeAgg = agg(recs, 2).sort((a, b) => (b[0] === 2) - (a[0] === 2));\n    { // ย้าย มหาวิทยาลัยเอกชน (0), วิทยาลัยเอกชน (4), สถาบันเอกชน (5) ไปไว้หลัง มหาวิทยาลัยรัฐไม่จำกัดรับ (6) ตามลำดับ\n      const moved = [];\n      [0, 4, 5].forEach(id => { const k = utypeAgg.findIndex(x => x[0] === id); if (k !== -1) moved.push(utypeAgg.splice(k, 1)[0]); });\n      const anchor = utypeAgg.findIndex(x => x[0] === 6);\n      if (anchor !== -1) utypeAgg.splice(anchor + 1, 0, ...moved); else utypeAgg.push(...moved);\n    }\n    const utypeCards = utypeAgg.map(([i, c], k) => ({ name: D.utype[i], cnt: fmt(c), pct: pctS(c, total), color: PAL[k % PAL.length] }));\n    const univAgg = agg(recs, 3);\n    const uq = S.univQ.trim();\n    const univFiltered = univAgg.filter(([i]) => !uq || D.umaster[i].includes(uq));\n    const univList = univFiltered.map(([i, c]) => ({\n      rank: univAgg.findIndex(p => p[0] === i) + 1, name: D.umaster[i], cnt: fmt(c), pct: pctS(c, total),\n      w: Math.max(1, 100 * c / (univAgg[0] ? univAgg[0][1] : 1)) + '%', color: accent,\n      rowBg: S.selUniv === i ? '#E7F1ED' : 'transparent', onClick: toggle('selUniv', i)\n    }));\n\n    let univSel = {};\n    if (S.selUniv != null) {\n      const ur = recs.filter(r => r[3] === S.selUniv);\n      const ut = ur.reduce((a, r) => a + r[10], 0) || 1;\n      univSel = {\n        univSelName: D.umaster[S.selUniv], univSelTotal: fmt(ut), univSelPct: (100 * ut / total).toFixed(2) + '%',\n        univSelType: ur.length ? D.utype[ur[0][2]] : '',\n        univSelNats: bars(agg(ur, 0).slice(0, 8), D.nat, ut, { mono: true }),\n        univSelLevels: agg(ur, 6).map(([i, c]) => ({ name: D.level[i], cnt: fmt(c), pct: pctS(c, ut) })),\n        univSelGender: agg(ur, 5).map(([i, c]) => ({ name: D.gender[i], cnt: fmt(c), pct: pctS(c, ut) })),\n        univSelFacs: agg(ur, 7).slice(0, 6).map(([i, c]) => ({ name: D.fac[i], cnt: fmt(c) }))\n      };\n    }\n\n    // faculty tab — show ALL faculties & degrees (searchable, scrollable)\n    const fq = S.facQ.trim();\n    const facAgg = agg(recs, 7);\n    const facFiltered = fq ? facAgg.filter(([i]) => D.fac[i].includes(fq)) : facAgg;\n    const facBars = bars(facFiltered, D.fac, total, { mono: true });\n    const dq = S.degQ.trim();\n    const degAgg = agg(recs, 8);\n    const degFiltered = dq ? degAgg.filter(([i]) => D.degree[i].includes(dq)) : degAgg;\n    const degreeBars = bars(degFiltered, D.degree, total, { mono: true });\n    const CLS_ORDER = ['ปี1', 'ปี2', 'ปี3', 'ปี4', 'ปี5', 'ตั้งแต่ปี2ขึ้นไป', 'ตั้งแต่ปี3ขึ้นไป', 'ตั้งแต่ปี4ขึ้นไป', 'ตั้งแต่ปี6ขึ้นไป'];\n    const clsAgg = agg(recs, 9).sort((a, b) => CLS_ORDER.indexOf(D.cls[a[0]]) - CLS_ORDER.indexOf(D.cls[b[0]]));\n    const clsMax = Math.max(...clsAgg.map(([, c]) => c), 1);\n    const classBars = clsAgg.map(([i, c]) => ({\n      name: D.cls[i], cnt: fmt(c), pct: pctS(c, total), w: Math.max(1.5, 100 * c / clsMax) + '%', color: accent\n    }));\n\n    // table tab\n    const tm = new Map();\n    for (const r of recs) {\n      const k = r[0] + '|' + r[3] + '|' + r[6];\n      tm.set(k, (tm.get(k) || 0) + r[10]);\n    }\n    const tq = S.tableQ.trim().toUpperCase();\n    let tRows = [...tm.entries()].sort((a, b) => b[1] - a[1]);\n    const tTotal = tRows.length;\n    if (tq) tRows = tRows.filter(([k]) => {\n      const [n, u] = k.split('|').map(Number);\n      return D.nat[n].toUpperCase().includes(tq) || D.umaster[u].includes(S.tableQ.trim());\n    });\n    const shown = tRows.slice(0, 300);\n    const tableRows = shown.map(([k, c], i) => {\n      const [n, u, l] = k.split('|').map(Number);\n      return { rank: i + 1, nat: D.nat[n], univ: D.umaster[u], level: D.level[l], cnt: fmt(c) };\n    });\n    const tableInfo = `แสดง ${fmt(shown.length)} จาก ${fmt(tRows.length)} รายการ (รวมทั้งหมด ${fmt(tTotal)} ชุดข้อมูล) เรียงตามจำนวนมาก→น้อย`;\n\n    return {\n      ...base, kpis,\n      ugChips: chip('ug', 1, D.ug, [1, 0, 2]),\n      levelChips: chip('level', 6, D.level, levelOrder),\n      genderChips: chip('gender', 5, D.gender),\n      natBars, natShare, levelBars, genderSeg, ugCards,\n      natList, natCount: fmt(natFiltered.length), ...natSel,\n      utypeCards, univList, univCount: fmt(univFiltered.length), ...univSel,\n      facBars, facCount: fmt(facFiltered.length), degreeBars, degreeCount: fmt(degFiltered.length), classBars,\n      tableRows, tableInfo\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
